name: Build SamMaster

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Haxe 4.2.4 ───────────────────────────────────────────────────────────
      - name: Setup Haxe 4.2.4
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.4

      # ── Versioned haxelib packages ────────────────────────────────────────────
      - name: Install versioned haxelib packages
        shell: bash
        run: |
          haxelib install actuate       1.9.0  --quiet
          haxelib install flixel        4.11.0 --quiet
          haxelib install flixel-addons 2.8.0  --quiet
          haxelib install flixel-tools  1.5.0  --quiet
          haxelib install flixel-ui     2.4.0  --quiet
          haxelib install hscript       2.4.0  --quiet
          haxelib install hvm           0.0.2  --quiet
          haxelib install hxcpp         4.3.2  --quiet
          haxelib install lime          7.7.0  --quiet
          haxelib install lime-samples  7.0.0  --quiet
          haxelib install linc_luajit   0.0.7  --quiet
          haxelib install newgrounds    1.2.0  --quiet
          haxelib install openfl        9.1.0  --quiet
          haxelib install polymod       1.3.0  --quiet
          haxelib install random        1.4.1  --quiet
          haxelib install seedyrng      1.1.0  --quiet

      # ── Git-based haxelib packages ────────────────────────────────────────────
      - name: Install git haxelib packages
        shell: bash
        run: |
          haxelib git discord_rpc    https://github.com/Aidan63/linc_discord-rpc.git  --quiet
          haxelib git faxe           https://github.com/uhrobots/faxe.git             --quiet
          haxelib git hscript-plus   https://github.com/away3d/hscript-plus.git       --quiet
          haxelib git systools       https://github.com/nickelc/modio-haxe.git        --quiet

      # ── lime setup ───────────────────────────────────────────────────────────
      - name: Setup lime
        shell: bash
        run: haxelib run lime setup -y

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Compile (Windows release)
        shell: bash
        run: haxelib run lime build windows -release

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SamMaster-Windows
          path: export/release/windows/bin/
          if-no-files-found: error
